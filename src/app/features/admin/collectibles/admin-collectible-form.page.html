<div class="form-shell">
  <header class="form-toolbar">
    <nav class="crumb">
      Collezionabili <span class="sep">›</span>
      <span class="current">{{ isEditMode ? 'Modifica' : 'Nuovo collezionabile' }}</span>
    </nav>
    <div class="spacer"></div>
    <button type="button" class="tq-btn-ghost" (click)="onCancel()">Annulla</button>
    <button type="button" class="tq-btn-primary" [disabled]="isSaving()" (click)="onSubmit()">
      {{ isSaving() ? 'Salvataggio…' : 'Salva' }}
    </button>
  </header>

  <div class="form-body">
    @if (isLoading()) {
      <div class="state">Caricamento…</div>
    } @else {
      <form class="card" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="preview-col">
          <div class="preview-frame">
            @if (previewUrl()) {
              <img [src]="previewUrl()" alt="Anteprima collezionabile" />
            } @else {
              <span class="preview-empty">Anteprima immagine</span>
            }
          </div>
        </div>

        <div class="fields-col">
          <mat-form-field appearance="outline" class="full">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="name" maxlength="100" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full">
            <mat-label>Descrizione</mat-label>
            <textarea matInput formControlName="description" rows="3" maxlength="500"></textarea>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full">
            <mat-label>URL immagine</mat-label>
            <input matInput formControlName="imageUrl" placeholder="https://…" />
          </mat-form-field>

          <div class="rarity-block">
            <span class="block-label">Rarità</span>
            <div class="rarity-chips">
              @for (opt of rarityOptions; track opt.value) {
                <button
                  type="button"
                  class="rarity-chip rarity-chip--{{ opt.value }}"
                  [class.rarity-chip--active]="selectedRarity() === opt.value"
                  (click)="setRarity(opt.value)"
                >
                  {{ opt.label }}
                </button>
              }
            </div>
          </div>
        </div>
      </form>
    }
  </div>
</div>

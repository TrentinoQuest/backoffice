<div class="op-shell">
  <header class="op-header">
    <div class="op-brand">
      <div class="brand-mark" aria-hidden="true">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#fff"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 17 7 9 11 13 15 7 19 13" />
          <line x1="3" y1="20" x2="21" y2="20" />
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Trentino Quest</span>
        <span class="brand-role">Operatore</span>
      </div>
    </div>

    <div class="op-header-actions">
      <div class="user-chip">
        <div class="user-avatar" aria-hidden="true">
          {{ (user()?.email ?? 'O').charAt(0).toUpperCase() }}
        </div>
        <span class="user-email">{{ user()?.email }}</span>
      </div>
      <button
        class="logout-btn"
        type="button"
        (click)="logout()"
        title="Esci"
        aria-label="Esci dall'account"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span class="logout-label">Esci</span>
      </button>
    </div>
  </header>

  <main class="op-content">
    <router-outlet />
  </main>
</div>

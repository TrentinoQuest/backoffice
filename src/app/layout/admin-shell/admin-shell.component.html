<div class="shell">
  <app-command-palette />
  <app-shortcuts-help />

  <!-- ── Sidebar wrapper (overflow:visible per il bottone collapse) ── -->
  <div class="sidebar-wrap" [class.sidebar-wrap--collapsed]="sidebarCollapsed()">
    <aside class="sidebar">
      <!-- Brand header -->
      <div class="sidebar-header">
        <div class="brand-mark" aria-hidden="true">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 17 7 9 11 13 15 7 19 13" />
            <line x1="3" y1="20" x2="21" y2="20" />
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">Trentino Quest</div>
          <div class="brand-sub">Admin</div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="nav-list" aria-label="Navigazione principale">
        @for (item of navItems; track item.route) {
          <a
            class="nav-item"
            [routerLink]="item.route"
            routerLinkActive="nav-item--active"
            [routerLinkActiveOptions]="{ exact: item.exactMatch }"
            [attr.title]="sidebarCollapsed() ? item.label : null"
          >
            <svg
              class="nav-icon"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path [attr.d]="item.svgPath" />
              @if (item.svgExtra) {
                <path [attr.d]="item.svgExtra" />
              }
            </svg>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        }
      </nav>

      <!-- User footer -->
      <div class="sidebar-footer">
        <div class="user-avatar" aria-hidden="true">
          {{ (user()?.email ?? 'U').charAt(0).toUpperCase() }}
        </div>
        <div class="user-info">
          <div class="user-email">{{ user()?.email }}</div>
          <div class="user-role">Amministratore</div>
        </div>
        <button
          class="logout-btn"
          type="button"
          (click)="logout()"
          title="Esci"
          aria-label="Esci dall'account"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- Collapse toggle — vive sul wrapper (overflow:visible) -->
    <button
      class="collapse-btn"
      type="button"
      (click)="toggleSidebar()"
      [attr.aria-label]="sidebarCollapsed() ? 'Espandi sidebar' : 'Collassa sidebar'"
    >
      <svg
        width="10"
        height="10"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
      >
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
  </div>

  <!-- ── Main area ── -->
  <div class="main">
    <!-- Toolbar principale (nascosta quando hideShellToolbar=true) -->
    @if (showToolbar()) {
      <div class="toolbar" role="banner">
        <nav class="breadcrumb" aria-label="Posizione corrente">
          <span class="bc-root">Admin</span>
          @if (breadcrumb.config().label) {
            <span class="bc-sep" aria-hidden="true">›</span>
            <span class="bc-current">{{ breadcrumb.config().label }}</span>
          }
        </nav>
        <div class="toolbar-spacer"></div>
        <button
          type="button"
          class="global-search"
          aria-label="Ricerca globale"
          (click)="openPalette()"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span class="gs-label">Cerca ovunque…</span>
          <kbd aria-label="Scorciatoia tastiera Command K">⌘K</kbd>
        </button>
      </div>
    }

    <!-- Contenuto pagina -->
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>

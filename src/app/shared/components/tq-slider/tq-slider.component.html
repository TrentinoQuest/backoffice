<div class="tq-slider" [class.tq-slider--disabled]="disabled()">
  <div class="tq-slider-value" aria-live="polite">{{ value() }}</div>
  <div
    class="tq-slider-track"
    #track
    (click)="onTrackClick($event)"
    (keydown)="onTrackKeydown($event)"
    tabindex="0"
  >
    <div class="tq-slider-fill" [style.width.%]="fillPct()"></div>
    <div
      class="tq-slider-thumb"
      [style.left.%]="fillPct()"
      (mousedown)="onThumbMousedown($event)"
      role="slider"
      [attr.aria-valuemin]="min()"
      [attr.aria-valuemax]="max()"
      [attr.aria-valuenow]="value()"
      [attr.aria-label]="label()"
      tabindex="0"
    ></div>
  </div>
</div>
